name: MLOps Pipeline

on:
  push:
    branches: [ main ]

jobs:
  train:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install dependencies
      run: |
        pip install dvc[s3] pandas scikit-learn joblib

    # Configure AWS credentials
    - name: Configure AWS credentials
      run: |
        aws configure set aws_access_key_id ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws configure set aws_secret_access_key ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws configure set aws_session_token ${{ secrets.AWS_SESSION_TOKEN }}
        aws configure set region us-east-1

    # Pull dataset from S3
    - name: Pull dataset from DVC remote
      run: dvc pull

    # Run training pipeline
    - name: Train model
      run: dvc repro

    # Show metrics
    - name: Display metrics
      run: |
        echo "Roll No: 2022BCS0044" >> $GITHUB_STEP_SUMMARY
        echo "Training Metrics:" >> $GITHUB_STEP_SUMMARY
        cat metrics.json >> $GITHUB_STEP_SUMMARY

    # Save metrics as artifact
    - name: Upload metrics artifact
      uses: actions/upload-artifact@v4
      with:
        name: metrics
        path: metrics.json

    # Build Docker image
    - name: Build Docker image
      run: docker build -t 2022bcs0044hadiqc/mlops-lab8 .

    # Login to Docker Hub
    - name: Login to DockerHub
      run: echo ${{ secrets.DOCKER_PASSWORD }} | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin

    # Push Docker image
    - name: Push Docker image
      run: docker push 2022bcs0044hadiqc/mlops-lab8